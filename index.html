<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>The Sanyam - Aksha Story</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cormorant:wght@400;600;700&family=Lora:wght@300;400;500;600&display=swap');
        :root {
            --gold: #c4933f;
            --rose: #c97a7a;
            --teal: #5a9b8f;
            --cream: #f5eff0;
            --light-bg: #faf7f5;
            --dark-brown: #5c3d1f;
            --brown: #8b5a2b;
        }

        html {
            background-color: var(--light-bg) !important;
            color-scheme: light !important;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--light-bg) !important;
            color: var(--dark-brown);
            overflow-x: hidden;
        }

        /* ANIMATIONS */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(10deg); } }
        @keyframes shimmer { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.3; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(196, 147, 63, 0.3); } 50% { box-shadow: 0 0 40px rgba(196, 147, 63, 0.6); } }
        @keyframes slideInUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        

        #musicBtn.playing {
        background: linear-gradient(135deg, #c4933f, #c97a7a);
        box-shadow: 0 0 25px rgba(196,147,63,0.6);
        }

        /* PETALS */
        .petals {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite, shimmer 4s ease-in-out infinite;
        }

        /* LOCK SCREEN */
        #lockScreen {
            position: fixed;
            inset: 0;
            background-color: white !important;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
            padding: 0;
        }

        #lockScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .envelope-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        /* ENVELOPE REVEAL OVERLAY */
        #envelopeReveal {
            position: fixed;
            inset: 0;
            background-color: white !important;
            z-index: 999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0;
            overflow: hidden;
        }

        #envelopeReveal.show {
            display: flex;
        }

        #envelopeReveal.hidden {
            display: none;
            pointer-events: none;
        }

        .envelope-reveal-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .envelope-open-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .continue-btn {
            position: absolute;
            bottom: 30px;
            padding: 0;
            background-color: transparent;
            color: white;
            border: none;
            border-radius: 0;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            font-family: 'Lora', serif;
            z-index: 10;
            animation: floatBtn 2s ease-in-out infinite;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .continue-btn:hover {
            background-color: transparent;
            transform: none;
        }

        @keyframes floatBtn {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* MAIN CONTENT */
        #main {
            background-color: var(--light-bg) !important;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #main.visible {
            opacity: 1;
        }

        /* HERO */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            gap: 2rem;
            text-align: center;
            background-color: var(--light-bg) !important;
        }

        .hero-quote {
            font-size: 2.8rem;
            font-style: italic;
            color: var(--rose);
            max-width: 800px;
            line-height: 1.8;
            animation: slideInUp 0.8s ease-out 0.2s backwards;
        }

        .hero-quote-author {
            font-size: 0.9rem;
            color: var(--gold);
            animation: slideInUp 0.8s ease-out 0.35s backwards;
        }

        .hero-names {
            animation: slideInUp 0.8s ease-out 0.5s backwards;
            transition: all 0.3s ease;
        }

        .hero-names:hover {
            transform: scale(1.02);
        }

        #musicBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 5000;

            width: 55px;
            height: 55px;
            border-radius: 50%;

            display: none;
            align-items: center;
            justify-content: center;

            border: none;
            cursor: pointer;

            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);

            color: white;
            font-size: 18px;

            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
            animation: pulseMusic 2.5s infinite;
        }

        #musicBtn:hover {
            transform: scale(1.1);
            background: rgba(0, 0, 0, 0.85);
        }

        #musicBtn:active {
            transform: scale(0.95);
        }
