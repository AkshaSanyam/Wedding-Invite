<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>The Sanyam - Aksha Story</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cormorant:wght@400;600;700&family=Lora:wght@300;400;500;600&display=swap');
        :root {
            --gold: #c4933f;
            --rose: #c97a7a;
            --teal: #5a9b8f;
            --cream: #f5eff0;
            --light-bg: #faf7f5;
            --dark-brown: #5c3d1f;
            --brown: #8b5a2b;
        }

        html {
            background-color: var(--light-bg) !important;
            color-scheme: light !important;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--light-bg) !important;
            color: var(--dark-brown);
            overflow-x: hidden;
        }

        /* ANIMATIONS */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(10deg); } }
        @keyframes shimmer { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.3; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(196, 147, 63, 0.3); } 50% { box-shadow: 0 0 40px rgba(196, 147, 63, 0.6); } }
        @keyframes slideInUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        

        #musicBtn.playing {
        background: linear-gradient(135deg, #c4933f, #c97a7a);
        box-shadow: 0 0 25px rgba(196,147,63,0.6);
        }

        /* PETALS */
        .petals {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite, shimmer 4s ease-in-out infinite;
        }

        /* LOCK SCREEN */
        #lockScreen {
            position: fixed;
            inset: 0;
            background-color: white !important;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
            padding: 0;
        }

        #lockScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .envelope-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        /* ENVELOPE REVEAL OVERLAY */
        #envelopeReveal {
            position: fixed;
            inset: 0;
            background-color: white !important;
            z-index: 999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0;
            overflow: hidden;
        }

        #envelopeReveal.show {
            display: flex;
        }

        #envelopeReveal.hidden {
            display: none;
            pointer-events: none;
        }

        .envelope-reveal-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .envelope-open-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .continue-btn {
            position: absolute;
            bottom: 30px;
            padding: 0;
            background-color: transparent;
            color: white;
            border: none;
            border-radius: 0;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            font-family: 'Lora', serif;
            z-index: 10;
            animation: floatBtn 2s ease-in-out infinite;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .continue-btn:hover {
            background-color: transparent;
            transform: none;
        }

        @keyframes floatBtn {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* MAIN CONTENT */
        #main {
            background-color: var(--light-bg) !important;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #main.visible {
            opacity: 1;
        }

        /* HERO */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            gap: 2rem;
            text-align: center;
            background-color: var(--light-bg) !important;
        }

        .hero-quote {
            font-size: 2.8rem;
            font-style: italic;
            color: var(--rose);
            max-width: 800px;
            line-height: 1.8;
            animation: slideInUp 0.8s ease-out 0.2s backwards;
        }

        .hero-quote-author {
            font-size: 0.9rem;
            color: var(--gold);
            animation: slideInUp 0.8s ease-out 0.35s backwards;
        }

        .hero-names {
            animation: slideInUp 0.8s ease-out 0.5s backwards;
            transition: all 0.3s ease;
        }

        .hero-names:hover {
            transform: scale(1.02);
        }

        #musicBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 5000;

            width: 55px;
            height: 55px;
            border-radius: 50%;

            display: none;
            align-items: center;
            justify-content: center;

            border: none;
            cursor: pointer;

            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);

            color: white;
            font-size: 18px;

            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
            animation: pulseMusic 2.5s infinite;
        }

        #musicBtn:hover {
            transform: scale(1.1);
            background: rgba(0, 0, 0, 0.85);
        }

        #musicBtn:active {
            transform: scale(0.95);
        }

        @keyframes pulseMusic {
            0%, 100% {
                box-shadow: 0 0 15px rgba(255,255,255,0.15);
            }
            50% {
                box-shadow: 0 0 25px rgba(255,255,255,0.35);
            }
        }

        .groom-name, .bride-name {
            font-family: 'Cormorant', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--dark-brown);
            letter-spacing: 1px;
        }

        .groom-family, .bride-family {
            font-size: 0.9rem;
            color: var(--brown);
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .ampersand {
            font-family: 'Cormorant', serif;
            font-size: 2rem;
            color: var(--gold);
            margin: 0.5rem 0;
        }

        .scroll-hint {
            margin-top: 2rem;
            font-size: 0.95rem;
            color: var(--rose);
            letter-spacing: 1px;
            animation: bounce 2s ease-in-out infinite;
        }

        /* SAVE THE DATE */
        .save-date-section {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
            text-align: center;
            background-color: var(--light-bg) !important;
        }

        .section-title {
            font-family: 'Cormorant', serif;
            font-size: 2.8rem;
            color: var(--dark-brown);
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .section-title .highlight {
            color: var(--rose);
        }

        .section-subtitle {
            font-size: 0.9rem;
            color: var(--brown);
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        .scratch-cards-container {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .scratch-card {
            width: 100px;
            height: 140px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--teal) 0%, #4a8a7f 100%);
            border: 3px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            user-select: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            touch-action: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .scratch-card:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 20px 50px rgba(90, 155, 143, 0.35);
            border-color: #d4af37;
        }

        .scratch-card:active {
            transform: translateY(-3px) scale(0.98);
        }

        .scratch-card canvas {
            position: absolute;
            cursor: pointer;
            z-index: 10;
            touch-action: none;
        }

        .scratch-text {
            position: relative;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-weight: 700;
        }

        .scratch-card.revealed .scratch-text {
            opacity: 1;
        }

        .countdown-timer {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .timer-box {
            text-align: center;
        }

        .timer-number {
            font-family: 'Cormorant', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--rose);
        }

        .timer-label {
            font-size: 0.8rem;
            color: var(--brown);
            letter-spacing: 1px;
            margin-top: 0.3rem;
        }

        .timer-sep {
            font-size: 1.5rem;
            color: var(--gold);
        }

        /* OUR STORY */
        .story-section {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            text-align: center;
            background-color: var(--light-bg) !important;
        }

        .story-subtitle {
            font-size: 0.9rem;
            color: var(--brown);
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        .story-stack-container {
            position: relative;
            height: 550px;
            max-width: 500px;
            margin: 0 auto 1rem;
        }

        .story-card {
            position: absolute;
            width: 100%;
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .story-card.active {
            opacity: 1;
            z-index: 10;
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 30px 80px rgba(201, 122, 122, 0.25);
        }

        .story-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 35px 100px rgba(90, 155, 143, 0.3);
        }

        .story-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            transition: all 0.4s ease;
        }

        .story-card:hover .story-image {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .story-label {
            font-family: 'Cormorant', serif;
            font-size: 1.3rem;
            color: var(--teal);
            margin-bottom: 0.8rem;
        }

        .story-description {
            font-size: 1rem;
            color: var(--brown);
            line-height: 1.7;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .story-nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .story-nav-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: white;
            border: 2px solid var(--teal);
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--teal);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 5px 15px rgba(90, 155, 143, 0.15);
            position: relative;
            overflow: hidden;
        }

        .story-nav-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--teal), #4a8a7f);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .story-nav-btn:hover {
            background: var(--teal);
            color: white;
            transform: scale(1.15) translateY(-5px);
            box-shadow: 0 15px 40px rgba(90, 155, 143, 0.35);
        }

        .story-nav-btn:active {
            transform: scale(0.95);
        }

        /* SACRED CEREMONIES */
        .ceremonies-section {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
            background-color: var(--light-bg) !important;
        }

        .ceremonies-title {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .event-tabs {
            display: none;
        }

        /* ================= CEREMONIES ================= */

#eventContents{
    display:grid;
    grid-template-columns:repeat(2,minmax(320px,1fr));
    gap:2rem;
    margin-top:2rem;
}

.ceremony-venue-banner{
    max-width:420px;
    margin:1.5rem auto 2.5rem;
    padding:1rem 2rem;
    background:linear-gradient(180deg,#fff,#fdfaf7);
    border:1px solid rgba(196,147,63,.18);
    border-radius:18px;
    text-align:center;
    box-shadow:0 12px 30px rgba(0,0,0,.08);
}

.venue-banner-label{
    font-size:.75rem;
    text-transform:uppercase;
    letter-spacing:2px;
    color:var(--gold);
    margin-bottom:.35rem;
}

.venue-banner-name{
    font-family:'Cormorant',serif;
    font-size:1.6rem;
    color:var(--dark-brown);
}

.day-panel{
    background:white;
    border-radius:22px;
    padding:2rem;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    border:1px solid rgba(196,147,63,.18);
    transition:.35s;
}

.day-panel:hover{
    transform:translateY(-6px);
    box-shadow:0 25px 60px rgba(0,0,0,.12);
}

.day-header{
    font-family:'Cormorant',serif;
    font-size:2rem;
    color:var(--dark-brown);
    text-align:center;
    letter-spacing:1px;
}

.day-divider{
    width:80px;
    height:2px;
    background:linear-gradient(
        to right,
        transparent,
        var(--gold),
        transparent
    );
    margin:1rem auto 2rem;
}

.event-card{
    background:linear-gradient(
        180deg,
        #fff,
        #fdfaf7
    );
    border-radius:18px;
    padding:1.5rem;
    margin-bottom:1rem;
    cursor:pointer;
    transition:.35s;
    border:1px solid rgba(196,147,63,.12);
}

.event-card:last-child{
    margin-bottom:0;
}

.event-card:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 35px rgba(90,155,143,.15);
}

.event-title{
    font-family:'Cormorant',serif;
    font-size:1.7rem;
    text-align:center;
    color:var(--dark-brown);
    margin-bottom:.8rem;
}

.event-time{
    color:var(--rose);
    text-align:center;
    margin-bottom:1rem;
}

.event-venue-label{
    font-size:.72rem;
    text-transform:uppercase;
    letter-spacing:2px;
    color:var(--gold);
    text-align:center;
    margin-bottom:.3rem;
}

.event-venue{
    color:var(--brown);
    text-align:center;
    line-height:1.6;
}

        /* CEREMONY ANIMATIONS */
        .ceremony-overlay {
            position: fixed;
            inset: 0;
            z-index: 1999;
            pointer-events: none;
            overflow: hidden;
        }

        .ceremony-overlay.active {
            animation: fadeOutOverlay 4.5s ease-out forwards;
        }

        @keyframes fadeOutOverlay {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .heart {
            position: absolute;
            font-size: 2rem;
            color: #27ae
